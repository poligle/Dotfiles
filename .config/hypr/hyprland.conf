####################################################################################

    monitor = ,preferred,auto,1
    monitor = HDMI-A-1, 1920x1080@144, 1920x0, 1
    #monitor = ,1920x1080@60, auto, 1, mirror, eDP-1

    $terminal = kitty
    $fileManager = nautilus
    $menu = wofi
    $browser = firefox
    $pomodoro = solanum
    $notes = obsidian
    $code = code
    $music = spotify-launcher
    $colorPicker = hyprpicker -a

####################################################################################

    exec-once = hyprlock
    exec-once = hypridle
    exec-once = waybar
    exec-once = awww-daemon
    exec-once = dunst
    exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
    exec-once = nm-applet
    exec-once = blueman-applet

    exec-once = hyprctl setcursor Bibata-Modern-Classic 20
    exec-once = ~/.local/bin/mic-led-sync
    exec-once = ~/.local/bin/waybar-autohide

    exec-once = conky -c ~/.config/conky/clock.conf
    exec-once = conky -c ~/.config/conky/system.conf
    exec-once = conky -c ~/.config/conky/net.conf


####################################################################################

    env = XCURSOR_SIZE,20
    env = HYPRCURSOR_SIZE,20
    env = HYPRCURSOR_THEME,Bibata-Modern-Classic

    env = QT_QPA_PLATFORM,wayland
    env = QT_QPA_PLATFORMTHEME,qt6ct
    env = QT_STYLE_OVERRIDE,Fusion

    WAYBAR_AUTOHIDE_MONITORS=0
    WAYBAR_AUTOHIDE_STATE=0
    WAYBAR_AUTOHIDE_REFRESH_RATE=0.25

####################################################################################

    general {
        gaps_in = 5
        gaps_out = 5

        border_size = 2

        col.active_border = rgba(78a9ffaa)
        col.inactive_border = rgba(2c2c2caa)

        resize_on_border = true
        allow_tearing = true
        layout = master # canvia amb SUPER+L (bind)
    }

####################################################################################

    decoration {
    rounding          = 10
    rounding_power    = 2
    inactive_opacity  = 0.7
    active_opacity    = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled       = true
        range         = 20
        scale         = 1.0
        color         = rgba(1a1a1aee)
        color_inactive = rgba(1a1a1aee)
    }

    blur {
        enabled    = true
        size       = 3
        passes     = 2
        brightness = 0.6
        contrast   = 1.0
        noise      = 0
        xray       = false
        popups     = false
    }
  }

####################################################################################

    animations {
        enabled = true
        bezier = linear, 0, 0, 1, 1
        bezier = md3_standard, 0.2, 0, 0, 1
        bezier = md3_decel, 0.05, 0.7, 0.1, 1
        bezier = md3_accel, 0.3, 0, 0.8, 0.15
        bezier = overshot, 0.05, 0.9, 0.1, 1.1
        bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
        bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
        bezier = menu_decel, 0.1, 1, 0, 1
        bezier = menu_accel, 0.38, 0.04, 1, 0.07
        bezier = easeInOutCirc, 0.85, 0, 0.15, 1
        bezier = easeOutCirc, 0, 0.55, 0.45, 1
        bezier = easeOutExpo, 0.16, 1, 0.3, 1
        bezier = softAcDecel, 0.26, 0.26, 0.15, 1
        bezier = md2, 0.4, 0, 0.2, 1
        bezier = snappyReturn, 0.4, 0.9, 0.6, 1.0
        bezier = bounce, 0.4, 0.9, 0.6, 1.0
        
        animation = windows, 1, 5,  snappyReturn, slidevert
        animation = windowsIn, 1, 3, snappyReturn, slidevert right 
        animation = windowsOut, 1, 5, snappyReturn, slide 
        animation = windowsMove, 1, 4, bounce, slide
        animation = border, 1, 10, default
        animation = fade, 1, 3, md3_decel

        animation = layersIn, 1, 3, menu_decel, slide
        animation = layersOut, 1, 1.6, menu_accel
        animation = fadeLayersIn, 1, 2, menu_decel
        animation = fadeLayersOut, 1, 4.5, menu_accel
        
        animation = workspaces, 1, 2.5, softAcDecel, slide
        animation = specialWorkspace, 1, 3, md3_decel, slidevert
    }

####################################################################################

    dwindle {
        pseudotile = true    
        preserve_split = true
    }

    master {
        new_status = master
    }

    misc {
        force_default_wallpaper = 0    
        disable_hyprland_logo = true
    }

####################################################################################

    input {
        kb_layout = es
        kb_variant =
        kb_model = thinkpad
        kb_options =
        kb_rules =

        follow_mouse = 1

        sensitivity = 0

        touchpad {
            natural_scroll = false
        }
    }

####################################################################################

    # 3 DITS:
    gesture = 3, horizontal, workspace
    gesture = 3, down, close
    gesture = 3, up, dispatcher, exec, wofi
    gesture = 3, pinch, dispatcher, fullscreen, 1

    # 4 DITS:
    #gesture = 4, up, dispatcher, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
    #gesture = 4, down, dispatcher, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
    gesture = 4, vertical, dispatcher, togglespecialworkspace
    gesture = 4, right, dispatcher, movetoworkspacesilent, e+1
    gesture = 4, left, dispatcher, movetoworkspacesilent, e-1
    gesture = 4, pinchin, dispatcher, exec, brightnessctl set +5%
    gesture = 4, pinchout, dispatcher, exec, brightnessctl set 5%-

####################################################################################

    device {
        name = tpps/2-synaptics-trackpoint
        sensitivity = -0.4
        scroll_method = no_scroll
    }
    device {
        name = logitech-pro-x-1
        sensitivity = -0.2
    }

####################################################################################

    $mainMod = SUPER

    bind = $mainMod, Super_L, exec, $terminal
    bind = $mainMod SHIFT, 201, exec, $menu
    bind = $mainMod, Space, exec, $menu
    bind = $mainMod, E, exec, $fileManager
    bind = $mainMod, X, exec, $browser
    bind = $mainMod, P, exec, $pomodoro
    bind = $mainMod, N, exec, $notes
    bind = $mainMod, M, exec, env GDK_BACKEND=x11 QT_QPA_PLATFORM=xcb MESA_GL_VERSION_OVERRIDE=3.3 /home/polig/Programs/Matlab/bin/matlab -desktop
    bind = $mainMod, C, exec, $code
    bind = $mainMod, S, exec, $music
    bind = $mainMod, H, exec, $colorPicker

    bind = $mainMod, Q, killactive,
    bind = $mainMod, V, togglefloating,
    bind = $mainMod, F, fullscreen, 1
    bind = SUPER, W, exec, ~/dotfiles/scripts/wall_next.sh
    bind = SUPER, L, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | grep -q 'dwindle' && echo 'master' || echo 'dwindle')"
    bind = $mainMod, K, exec, hyprlock

# Screenshot a window
    bindl = , XF86SelectiveScreenshot, exec, hyprshot -m region --clipboard-only
    bindl = , F10, exec, hyprshot -m region --clipboard-only
# Screenshot a monitor
    bindl = , PRINT, exec, hyprshot -m output --clipboard-only

# Move focus (i don't use it but here it is)
    bind = $mainMod, left, movefocus, l
    bind = $mainMod, right, movefocus, r
    bind = $mainMod, up, movefocus, u
    bind = $mainMod, down, movefocus, d

# Switch workspaces
    bind = $mainMod, XF86WakeUp, togglespecialworkspace
    bind = $mainMod, Escape, togglespecialworkspace
    bind = $mainMod, Control_L, movetoworkspacesilent, special

    bind = $mainMod, 1, workspace, 1
    bind = $mainMod, 2, workspace, 2
    bind = $mainMod, 3, workspace, 3
    bind = $mainMod, 4, workspace, 4
    bind = $mainMod, 5, workspace, 5
    bind = $mainMod, 6, workspace, 6
    bind = $mainMod, 7, workspace, 7
    bind = $mainMod, 8, workspace, 8
    bind = $mainMod, 9, workspace, 9
    bind = $mainMod, 0, workspace, 10
    bind = $mainMod, Tab, workspace, e+1

    bind = , mouse:275, workspace, e-1
    bind = , mouse:276, workspace, e+1

# Move active window to a workspace
    bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
    bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
    bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
    bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
    bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
    bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
    bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
    bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
    bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
    bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10


# Move/resize windows
    bindm = , mouse:274, movewindow
    bindm = , wl_pointer, movewindow

# Laptop multimedia keys for volume and LCD brightness
    bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
    bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    bindel = ,XF86AudioMicMute, exec, sh -c "wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && /home/polig/dotfiles/scripts/mic-led-sync"
    bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
    bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Requires playerctl
    bindl = , XF86AudioNext, exec, playerctl next
    bindl = , XF86AudioPause, exec, playerctl play-pause
    bindl = , XF86AudioPlay, exec, playerctl play-pause
    bindl = , XF86AudioPrev, exec, playerctl previous

####################################################################################

    windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
        name = suppress-maximize-events
        match:class = .*

        suppress_event = maximize
    }

    windowrule {
    # Fix some dragging issues with XWayland
        name = fix-xwayland-drags
        match:class = ^$
        match:title = ^$
        match:xwayland = true
        match:float = true
        match:fullscreen = false
        match:pin = false

        no_focus = true
    }

    windowrule {
        name = move-hyprland-run

        match:class = hyprland-run

        move = 20 monitor_h-120
        float = yes
    }
    windowrule {
        name = kitty-float
        match:class = $terminal

        float = on
        size = 800 500
        center = on
    }
    windowrule {
        name = nautilus-float
        match:class = org.gnome.Nautilus

        float = on
        size = 1000 700
        center = on
    }
    windowrule {
        name = wifi-float
        match:class = nm-connection-editor

        float = on
        size = 640 400
        move = 1270 50
    }
    windowrule {
        name = bluetooth-float
        match:class = blueman-manager

        float = on
        size = 640 400
        move = 1270 50
    }
    windowrule {
        name = vol-float
        match:class = org.pulseaudio.pavucontrol
        float = on
        size = 640 400
        move = 1270 50
    }
