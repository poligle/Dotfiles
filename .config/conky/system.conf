conky.config = {
    out_to_wayland = true,
    out_to_x = false,

    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    double_buffer = true,
    update_interval = 1,
    cpu_avg_samples = 2,
    no_buffers = true,

    use_xft = true,
    font = 'Sans Serif:size=10',
    xftalpha = 1,
    override_utf8_locale = true,
    uppercase = false,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    default_color = 'D9DEE7',
    color1 = '78A9FF',
    color2 = 'AAB2BF',

    default_bar_height = 5,
    default_bar_width = 205,

    minimum_width = 300,
    maximum_width = 300,
    minimum_height = 200,

    alignment = 'top_left',
    gap_x = 34,
    gap_y = 220,

    border_inner_margin = 14,
};

conky.text = [[
${voffset 6}${color1}Sistema${color}
${color2}${hr 1}${color}

CPU${alignr}${cpu}%
${cpubar 5,205}

RAM${alignr}${memperc}%
${membar 5,205}

Disco 1 (/)${alignr}${fs_used_perc /}%
${fs_bar 5,205 /}


Disco 2 (/home)${alignr}${fs_used_perc /home}%
${fs_bar 5,205 /home}

Disco 3 (/datos)${alignr}${fs_used_perc /datos}%
${fs_bar 5,205 /datos}

Kernel${alignr}${kernel}
Tiempo encendido${alignr}${uptime_short}
]];
