conky.config = {
    out_to_wayland = true,
    out_to_x = false,

    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    double_buffer = true,
    update_interval = 1,
    no_buffers = true,

    use_xft = true,
    font = 'Sans Serif:size=10',
    xftalpha = 1,
    override_utf8_locale = true,
    uppercase = false,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    default_color = 'D9DEE7',
    color1 = '78A9FF',
    color2 = 'AAB2BF',

    minimum_width = 300,
    maximum_width = 300,
    minimum_height = 110,

    alignment = 'top_left',
    gap_x = 34,
    gap_y = 34,

    border_inner_margin = 14,
};

conky.text = [[
${voffset 8}${font Sans Serif:size=50:bold}${color1}${time %H:%M}${color}
${voffset -8}${font Sans Serif:size=10}${color2}${time %A}${color}
${time %d %B %Y}
]];
